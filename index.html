<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worksheets — Phil Young's English School</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700;8..60,900&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#10182a;--surface:#182338;
    --ink:#e9edf4;--ink-soft:#94a1b8;--rule:#2c3a55;
    --accent-deep:#1f3a5f;--gold:#d9a548;--gold-deep:#2c2310;
    --shadow:0 1px 2px rgba(0,0,0,0.4);
    --radius:10px;
  }
  :root[data-theme="light"]{
    --bg:#f7f3e8;--surface:#fffdf8;
    --ink:#1d2535;--ink-soft:#6b7280;--rule:#d8cfb8;
    --accent-deep:#1f3a5f;--gold:#b8862e;--gold-deep:#f6e9cd;
    --shadow:0 1px 3px rgba(31,58,95,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--ink);
    min-height:100vh;transition:background 0.3s,color 0.3s;
  }
  a{color:inherit;}

  nav{
    position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;
    padding:0 1.5rem;background:var(--bg);border-bottom:1px solid var(--rule);
    transition:background 0.3s,border-color 0.3s;
  }
  .main-hub-link{color:var(--ink-soft);text-decoration:none;font-size:0.85rem;margin-right:1.3rem;transition:color 0.2s;}
  .main-hub-link:hover{color:var(--gold);}
  .nav-logo{font-family:'Source Serif 4',serif;font-weight:700;font-size:1.2rem;letter-spacing:-0.3px;text-decoration:none;color:var(--ink);}
  .nav-logo span{color:var(--gold);}
  .theme-toggle{
    margin-left:auto;background:none;border:1px solid var(--rule);border-radius:100px;
    width:34px;height:34px;cursor:pointer;font-size:1rem;display:flex;align-items:center;
    justify-content:center;color:var(--ink-soft);transition:all 0.2s;
  }
  .theme-toggle:hover{border-color:var(--gold);color:var(--gold);}

  main{max-width:760px;margin:0 auto;padding:3rem 1.5rem 5rem;}

  .hero h1{
    font-family:'Source Serif 4',serif;font-weight:900;font-size:clamp(2.2rem,7vw,3.2rem);
    letter-spacing:-1px;margin-bottom:0.5rem;
  }
  .hero p{color:var(--ink-soft);font-size:1rem;max-width:480px;line-height:1.6;margin-bottom:2rem;}

  .search-wrap{position:relative;margin-bottom:0.6rem;}
  .search-input{
    width:100%;font-family:'IBM Plex Sans',sans-serif;font-size:1.05rem;
    padding:0.95rem 1rem 0.95rem 2.6rem;border:none;border-bottom:2px dashed var(--rule);
    background:transparent;color:var(--ink);transition:border-color 0.2s;
  }
  .search-input::placeholder{color:var(--ink-soft);}
  .search-input:focus{outline:none;border-bottom-color:var(--gold);}
  .search-icon{position:absolute;left:0.2rem;top:50%;transform:translateY(-50%);color:var(--ink-soft);font-size:1.1rem;pointer-events:none;}
  .result-count{font-size:0.78rem;color:var(--ink-soft);letter-spacing:0.5px;margin:0.7rem 0 1.8rem;}

  .list{display:flex;flex-direction:column;gap:1rem;}

  .card{
    display:block;position:relative;background:var(--surface);border:1px solid var(--rule);
    border-radius:var(--radius);padding:1.2rem 1.4rem 1.1rem;text-decoration:none;
    box-shadow:var(--shadow);transition:transform 0.2s,border-color 0.2s;
    overflow:hidden;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--gold);}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
  .card-title{font-family:'Source Serif 4',serif;font-weight:700;font-size:1.2rem;line-height:1.3;}
  .class-tab{
    flex-shrink:0;background:var(--accent-deep);color:#fff;font-size:0.68rem;font-weight:600;
    letter-spacing:1px;text-transform:uppercase;padding:0.3rem 0.65rem;border-radius:5px;
    white-space:nowrap;
  }
  .card-divider{border:none;border-top:1px dashed var(--rule);margin:0.85rem 0 0.8rem;}

  .card-meta{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
  .topics{display:flex;flex-wrap:wrap;gap:0.4rem;}
  .topic-chip{
    font-size:0.74rem;color:var(--ink-soft);border:1px dashed var(--rule);border-radius:100px;
    padding:0.18rem 0.6rem;white-space:nowrap;
  }
  .stamp{
    flex-shrink:0;font-size:0.68rem;font-weight:600;letter-spacing:0.5px;color:var(--gold);
    border:1px solid var(--gold);border-radius:4px;padding:0.22rem 0.5rem;
    transform:rotate(-3deg);white-space:nowrap;background:var(--gold-deep);
  }

  .empty{
    text-align:center;padding:3rem 1rem;color:var(--ink-soft);font-size:0.95rem;
    border:1px dashed var(--rule);border-radius:var(--radius);
  }

  footer{text-align:center;color:var(--ink-soft);font-size:0.8rem;padding:2rem 0 2.5rem;}

  @media(max-width:480px){
    .card-top{flex-direction:column;}
    .class-tab{align-self:flex-start;}
    .card-meta{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>
<body>
<nav>
  <a class="main-hub-link" href="https://arschul.github.io/">← Main Hub</a>
  <a class="nav-logo" href="index.html">Work<span>sheets</span></a>
  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle light/dark mode">🌙</button>
</nav>

<main>
  <div class="hero">
    <h1>Worksheets</h1>
    <p>Printable grammar handouts for English Club and class — search by title, class, or topic.</p>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search worksheets…" oninput="render()">
  </div>
  <div class="result-count" id="resultCount"></div>

  <div class="list" id="list"></div>
  <div class="empty" id="empty" style="display:none;">No worksheets match that search. Try a different class or topic.</div>
</main>

<footer>Built for Phil Young's English School · Curitiba</footer>

<script>
  const worksheets = [
    {
      title: "Review of Tenses",
      class: "Basic 4",
      topics: ["Present Simple", "Present Continuous", "Past Simple", "Past Continuous", "Present Perfect"],
      date: "2026-06-17",
      file: "Basic 4 - Review of Tenses Worksheet.pdf"
    }
    // ADD NEW WORKSHEETS ABOVE THIS LINE
  ];

  const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  function stamp(iso){
    const [y,m,d] = iso.split("-").map(Number);
    return `${MONTHS[m-1]} ${d}, ${y}`;
  }

  function render(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const count = document.getElementById('resultCount');

    const matches = worksheets.filter(w => {
      const haystack = [w.title, w.class, ...w.topics].join(' ').toLowerCase();
      return haystack.includes(q);
    });

    list.innerHTML = matches.map(w => `
      <a class="card" href="${encodeURI(w.file)}" target="_blank" rel="noopener">
        <div class="card-top">
          <div class="card-title">${w.title}</div>
          <div class="class-tab">${w.class}</div>
        </div>
        <hr class="card-divider">
        <div class="card-meta">
          <div class="topics">${w.topics.map(t => `<span class="topic-chip">${t}</span>`).join('')}</div>
          <div class="stamp">ADDED ${stamp(w.date)}</div>
        </div>
      </a>
    `).join('');

    empty.style.display = matches.length ? 'none' : 'block';
    count.textContent = matches.length === worksheets.length
      ? `${worksheets.length} worksheet${worksheets.length === 1 ? '' : 's'}`
      : `${matches.length} of ${worksheets.length} worksheets`;
  }

  function toggleTheme(){
    const root = document.documentElement;
    const isLight = root.getAttribute('data-theme') === 'light';
    root.setAttribute('data-theme', isLight ? 'dark' : 'light');
    document.getElementById('theme-btn').textContent = isLight ? '🌙' : '☀️';
    localStorage.setItem('worksheets-theme', isLight ? 'dark' : 'light');
  }
  (function(){
    const saved = localStorage.getItem('worksheets-theme');
    if(saved === 'light'){
      document.documentElement.setAttribute('data-theme','light');
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('theme-btn');
        if(btn) btn.textContent = '☀️';
      });
    }
  })();

  document.addEventListener('keydown', e => {
    if(e.key === '/' && document.activeElement.id !== 'searchInput'){
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });

  render();
</script>
</body>
</html>
